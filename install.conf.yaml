- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~"]

- link:
    ~/.tmux.conf: tmux/tmux.conf
    ~/.tmux.conf.local: tmux/tmux.conf.local
    ~/.config/nvim/:
      glob: true
      path: nvim/*

    ~/.zshrc: zshrc
    ~/.config/zsh/:
      glob: true
      path: zsh/*

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - 
      command: sh -c 'if [ "${DOTFILES_SKIP_BOOTSTRAP:-0}" = "1" ]; then echo "Skipping dev package bootstrap"; else ./_scripts/init.sh; fi'
      stdout: true
      stderr: true
      description: Install dev packages
    -
      command: sh -c 'if [ "${DOTFILES_SKIP_BOOTSTRAP:-0}" = "1" ]; then echo "Skipping zsh bootstrap"; else ./_scripts/zsh_init.sh; fi'
      stdout: true
      stderr: true
      description: Setting up oh-my-zsh and plugins
